<body>
  <div id="app">

    <!-- ONBOARDING -->
    <div id="onboarding" class="onboarding hidden"></div>

    <!-- MAIN APP -->
    <div id="mainApp" class="main-app hidden">
      <header class="app-header">
        <div class="header-inner">
          <div class="header-brand">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="9" fill="#1d4ed8"/><path d="M7 22l5-7 4 5 3-4 5 6H7z" fill="white" opacity=".9"/><circle cx="22" cy="10" r="3" fill="#93c5fd"/></svg>
            <span class="header-title">VTC Finance</span>
          </div>
          <button class="period-trigger" id="openPeriodBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="periodLabel">Ce mois</span>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
          </button>
          <div id="syncBadge" class="sync-badge sync-badge--off" title="Non synchronisé"></div>
          <button class="icon-btn header-export" id="exportBtn" title="Exporter">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
      </header>

      <!-- PERIOD PANEL -->
      <div id="periodPanel" class="period-panel hidden">
        <div class="period-overlay" id="periodOverlay"></div>
        <div class="period-sheet" id="periodSheet">
          <div class="period-sheet-handle"></div>
          <div class="period-sheet-header">
            <h3>Période d'affichage</h3>
            <button class="icon-btn" id="closePeriodBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
          </div>
          <div id="periodOptions" class="period-options"></div>
          <div id="monthNavRow" class="month-nav-row hidden">
            <button class="icon-btn" id="prevMonthBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg></button>
            <span id="navMonthLabel" class="month-nav-label"></span>
            <button class="icon-btn" id="nextMonthBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg></button>
          </div>
          <div id="customDateRange" class="custom-date-range hidden">
            <div class="form-row two-col">
              <div class="form-group"><label>Du</label><input type="date" id="customDateStart" class="form-control" /></div>
              <div class="form-group"><label>Au</label><input type="date" id="customDateEnd" class="form-control" /></div>
            </div>
            <button class="btn btn-primary btn-sm full-width" id="applyCustomDate">Appliquer la plage</button>
          </div>
        </div>
      </div>

      <main class="tab-pages">
        <div class="tab-page active" id="page-dashboard"></div>
        <div class="tab-page" id="page-revenues"></div>
        <div class="tab-page" id="page-expenses"></div>
        <div class="tab-page" id="page-accounts"></div>
        <div class="tab-page" id="page-settings"></div>
      </main>

      <nav class="bottom-nav">
        <button class="nav-item active" data-tab="dashboard">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          <span>Tableau</span>
        </button>
        <button class="nav-item" data-tab="revenues">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span>Recettes</span>
        </button>
        <button class="nav-item" data-tab="expenses">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span>Dépenses</span>
        </button>
        <button class="nav-item" data-tab="accounts">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          <span>Comptes</span>
        </button>
        <button class="nav-item" data-tab="settings">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span>Paramètres</span>
        </button>
      </nav>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal hidden">
      <div class="modal-overlay" id="modalOverlay"></div>
      <div class="modal-dialog">
        <div class="modal-header">
          <h3 id="modalTitle"></h3>
          <button class="icon-btn" id="modalClose"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toastContainer" class="toast-container"></div>
  </div>

</body>
</html>
